version: 2

sources:

  # ── Raw ingestion tables ──────────────────────────────────────────────────
  # Written by Kafka consumers after consuming events from the raw.* topics.
  # Never modified after insert — append-only, raw data is immutable.

  - name: raw
    schema: raw
    description: "Immutable raw data as written by the ingestion pipeline Kafka consumers."
    tables:

      - name: sec_filings
        description: >
          One row per SEC filing ingested. Written by the SEC EDGAR Kafka consumer.
          May contain duplicates (same cik + period_of_report) if re-ingested —
          deduplication is handled by stg_sec_financials.
        columns:
          - name: cik
            description: "SEC Central Index Key, zero-padded to 10 digits."
          - name: company_name
            description: "Company name as reported in the SEC filing."
          - name: filing_type
            description: "Filing type: 10-K, 10-Q, or 8-K."
          - name: filed_date
            description: "Date the filing was submitted to SEC."
          - name: period_of_report
            description: "End date of the reporting period covered by the filing."
          - name: total_assets
            description: "Total assets in USD. NULL if not reported."
          - name: current_assets
            description: "Current assets in USD. NULL if not reported."
          - name: total_liabilities
            description: "Total liabilities in USD. NULL if not reported."
          - name: current_liabilities
            description: "Current liabilities in USD. NULL if not reported."
          - name: retained_earnings
            description: "Retained earnings in USD. NULL if not reported."
          - name: shareholders_equity
            description: "Shareholders equity in USD. NULL if not reported."
          - name: revenue
            description: "Revenue in USD. NULL if not reported."
          - name: ebit
            description: "Earnings before interest and taxes in USD. NULL if not reported."
          - name: net_income
            description: "Net income in USD. NULL if not reported."
          - name: interest_expense
            description: "Interest expense in USD. NULL if not reported."
          - name: cash
            description: "Cash and cash equivalents in USD. NULL if not reported."
          - name: long_term_debt
            description: "Long-term debt in USD. NULL if not reported."
          - name: inventory
            description: "Inventory in USD. NULL if not reported."
          - name: altman_z_score
            description: "Altman Z' Score (private company formula). NULL if financials insufficient."
          - name: going_concern_flag
            description: "True if auditor issued a going-concern qualification."
          - name: source_url
            description: "URL of the SEC EDGAR filing document."
          - name: ingested_at
            description: "Timestamp when this row was written to the database."

      - name: ais_events
        description: >
          Automatic Identification System vessel tracking events.
          One row per port arrival or departure event.
          Written by the AIS Kafka consumer (Phase 1 — not yet implemented).
        columns:
          - name: event_id
            description: "Unique event identifier (UUID)."
          - name: mmsi
            description: "Maritime Mobile Service Identity — unique vessel identifier."
          - name: vessel_name
            description: "Vessel name as broadcast by AIS transponder."
          - name: imo_number
            description: "IMO vessel number. More stable than MMSI across ownership changes."
          - name: port_id
            description: "UN/LOCODE of the port."
          - name: port_name
            description: "Human-readable port name."
          - name: country_code
            description: "ISO 3166-1 alpha-2 country code of the port."
          - name: event_type
            description: "One of: arrival, departure."
          - name: event_timestamp
            description: "UTC timestamp of the arrival or departure."
          - name: cargo_type
            description: "Cargo type code. NULL if not broadcast."
          - name: gross_tonnage
            description: "Vessel gross tonnage. NULL if not broadcast."
          - name: dwell_hours
            description: "Hours spent in port. NULL for departure events."
          - name: supplier_id
            description: "Resolved supplier ID if vessel ownership is resolved. NULL otherwise."
          - name: ingested_at
            description: "Timestamp when this row was written to the database."

      - name: macro_series
        description: >
          Macroeconomic time-series data.
          One row per series per date. Sources: FRED, World Bank, commodity APIs.
          Written by the macro Kafka consumer (Phase 1 — not yet implemented).
        columns:
          - name: series_id
            description: "Unique series identifier (e.g. FRED:T10Y2Y, WB:PMI_MFG_US)."
          - name: series_name
            description: "Human-readable series name."
          - name: series_date
            description: "Date of the observation."
          - name: value
            description: "Observed value. NULL if data not available for this date."
          - name: unit
            description: "Unit of measurement (e.g. percent, index, USD/barrel)."
          - name: industry_code
            description: "NAICS industry code this series applies to. NULL for economy-wide series."
          - name: source_name
            description: "Data source name (e.g. FRED, WorldBank, EIA)."
          - name: ingested_at
            description: "Timestamp when this row was written to the database."

      - name: geo_events
        description: >
          Geopolitical risk events by country and date.
          Sources: ACLED, GDELT, government sanctions lists.
          Written by the geo Kafka consumer (Phase 1 — not yet implemented).
        columns:
          - name: event_id
            description: "Unique event identifier (UUID)."
          - name: country_code
            description: "ISO 3166-1 alpha-2 country code where the event occurred."
          - name: event_type
            description: "Event category: conflict, sanction, natural_disaster, political_instability."
          - name: event_date
            description: "Date the event occurred or was reported."
          - name: severity_score
            description: "Severity score 0.0–1.0. Higher = more severe."
          - name: on_sanctions_list
            description: "True if the country is on a major sanctions list (OFAC, EU, UN)."
          - name: description
            description: "Short description of the event."
          - name: source_name
            description: "Data source name (e.g. ACLED, GDELT, OFAC)."
          - name: ingested_at
            description: "Timestamp when this row was written to the database."

      - name: supplier_registry
        description: >
          Canonical supplier registry. One row per supplier.
          Written by the entity resolution pipeline when a new supplier is confirmed.
          This is the source of truth for supplier metadata used across all models.
        columns:
          - name: supplier_id
            description: "Internal supplier UUID, prefixed with 'sup_'."
          - name: canonical_name
            description: "Canonical company name after entity resolution."
          - name: country
            description: "ISO 3166-1 alpha-2 country code of the supplier's primary operations."
          - name: industry_code
            description: "NAICS 6-digit industry code. NULL if not yet classified."
          - name: duns_number
            description: "Dun & Bradstreet DUNS number. NULL if not available."
          - name: website
            description: "Company website URL. NULL if not available."
          - name: cik
            description: "SEC Central Index Key if the supplier is SEC-registered. NULL otherwise."
          - name: created_at
            description: "Timestamp when this supplier was first added to the registry."
          - name: updated_at
            description: "Timestamp of the most recent update to this supplier's record."

  # ── Enriched tables (written directly by ingestion pipeline, not raw events) ─
  # The news enrichment consumer writes fully-processed articles to this schema.
  # These are treated as sources rather than raw tables because enrichment
  # (NLP, entity resolution) already happened before the DB write.

  - name: enriched
    schema: staging
    description: "Enriched data written directly by ingestion pipeline consumers after NLP processing."
    tables:

      - name: stg_news_sentiment
        description: >
          Enriched news articles with FinBERT sentiment scores and topic flags.
          Written by NewsEnrichmentConsumer after consuming raw.news Kafka events.
          One row per article, deduplicated by article_id (SHA-256 of URL).
        columns:
          - name: article_id
            description: "SHA-256 of article URL. Primary key."
            tests:
              - not_null
              - unique
          - name: supplier_id
            description: "Resolved supplier ID. NULL if entity resolution failed."
          - name: supplier_name_raw
            description: "Raw company name extracted from article text. NULL if no mention found."
          - name: title
            description: "Article headline."
          - name: url
            description: "Canonical URL of the article."
          - name: published_at
            description: "UTC timestamp when the article was published."
          - name: source_name
            description: "Publisher name (e.g. Reuters, Bloomberg)."
          - name: sentiment_score
            description: "FinBERT sentiment score in [-1.0, 1.0]. Negative = bad news."
          - name: sentiment_label
            description: "One of: positive, negative, neutral."
          - name: topic_layoff
            description: "True if article mentions layoffs or workforce reductions."
          - name: topic_bankruptcy
            description: "True if article mentions bankruptcy, insolvency, or Chapter 11."
          - name: topic_strike
            description: "True if article mentions labour strikes or work stoppages."
          - name: topic_disaster
            description: "True if article mentions natural disasters, fires, or plant shutdowns."
          - name: topic_regulatory
            description: "True if article mentions regulatory action, fines, or investigations."
          - name: source_credibility
            description: "Domain credibility score 0.0–1.0 assigned at ingestion time."
          - name: word_count
            description: "Article word count."
          - name: processed_at
            description: "Timestamp when NLP processing completed."
