name: 'supplier_risk'
version: '1.0.0'
config-version: 2

profile: 'supplier_risk'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  supplier_risk:
    staging:
      +schema: staging
      +materialized: table
      +on_schema_change: fail    # fail loudly if schema changes unexpectedly
    marts:
      +schema: marts
      +materialized: table
