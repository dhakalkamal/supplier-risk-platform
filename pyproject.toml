[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
ignore = []

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_return_any = true
warn_unused_configs = true
explicit_package_bases = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v"

[tool.coverage.run]
omit = [
    "data/dags/*",              # Airflow DAGs require live Airflow context
    "backend/app/main.py",      # App factory wiring tested via integration tests (Phase 3)
    "backend/app/db/connection.py",    # asyncpg pool — requires live Postgres
    "backend/app/db/redis_client.py",  # Redis client — requires live Redis
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "class Postgres",          # Postgres implementations require a live DB (integration tests)
    "async def _fetch_jwks",   # Auth0 JWKS fetch — requires live Auth0
    "def _decode_jwt",         # JWT RS256 validation — requires real JWKS keys
]
